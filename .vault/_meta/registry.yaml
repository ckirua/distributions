- id: beta-binomial
  name: Beta-binomial
  title: Beta-binomial distribution
  wiki_path: Beta-binomial%5Fdistribution
  wikipedia: https://en.wikipedia.org/wiki/Beta-binomial%5Fdistribution
  category: with finite support
  category_path: discrete/finite-support
  type: discrete
  support: finite
  kind: distribution
  aliases:
  - Beta-binomial
  parameters_meta:
  - - n
    - trials
    - n\in\mathbb{N}
    - Number of attempts
  - - \alpha,\beta
    - Beta shape params
    - '>0'
    - Control over-dispersion of p
  summary: Binomial-like counts when the success probability itself is random (Beta-distributed).
  scenarios:
  - Over-dispersed success counts in heterogeneous populations.
  - Hierarchical A/B tests with random conversion rates.
  - Biological counts with extra variance beyond binomial.
  pmf: P(X=k)=\binom{n}{k}\frac{B(k+\alpha,n-k+\beta)}{B(\alpha,\beta)}
  pdf: null
  moments:
  - - Mean
    - n\alpha/(\alpha+\beta)
  - - Variance
    - see Wikipedia
  - &id001
    - Mode
    - —
  related_names:
  - Binomial
  - Beta
  - Negative binomial
