  wikipedia: https://en.wikipedia.org/wiki/Skellam%5Fdistribution
  category: with infinite support
  category_path: discrete/infinite-support
  type: discrete
  support: infinite
  kind: distribution
  aliases:
  - Skellam
  parameters_meta:
  - - \mu_1
    - Poisson rate 1
    - '>0'
    - Upward pressure on difference
  - - \mu_2
    - Poisson rate 2
    - '>0'
    - Downward pressure on difference
  summary: Difference of two independent Poisson counts.
  scenarios:
  - Net order flow (buys minus sells) in a window.
  - Goal difference when two Poisson processes compete.
  - Inventory change from arrivals minus departures.
  pmf: P(X=k)=e^{-(\mu_1+\mu_2)}(\mu_1/\mu_2)^{k/2}I_{|k|}(2\sqrt{\mu_1\mu_2})
  pdf: null
  moments:
  - - Mean
    - \mu_1-\mu_2
  - - Variance
    - \mu_1+\mu_2
  - - Mode
    - \lfloor\mu_1-\mu_2\rfloor
  related_names:
  - Poisson
  - Normal (Gaussian)
